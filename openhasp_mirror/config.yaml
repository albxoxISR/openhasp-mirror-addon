name: "openHASP Mirror"
description: "Live screen mirror and remote touch control for openHASP plates"
version: "1.0.0"
slug: "openhasp_mirror"
init: false
ingress: true
ingress_port: 8100
panel_icon: mdi:monitor-eye
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386
homeassistant_api: true
hassio_api: true
services:
  - mqtt:need

options:
  plates: []

schema:
  plates:
    - name: str
      ip: str
