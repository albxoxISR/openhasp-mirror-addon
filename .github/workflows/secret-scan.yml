name: Secret Scan

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          echo "Scanning for sensitive information..."
          FOUND=0

          # Patterns to detect
          # JWT tokens (eyJ...)
          if grep -rn --include='*.py' --include='*.js' --include='*.yaml' --include='*.yml' --include='*.json' --include='*.md' --include='*.html' --include='*.sh' \
            -E 'eyJ[A-Za-z0-9_-]{20,}\.' . --exclude-dir=.git --exclude-dir=node_modules; then
            echo "::error::Found JWT token in source files!"
            FOUND=1
          fi

          # Hardcoded passwords (password = "...", password: "...")
          if grep -rn --include='*.py' --include='*.js' --include='*.yaml' --include='*.yml' --include='*.json' --include='*.html' --include='*.sh' \
            -iE '(password|passwd|pwd)\s*[=:]\s*["\x27][^"\x27]{4,}' . --exclude-dir=.git --exclude-dir=node_modules \
            | grep -v 'password.*get\|password.*environ\|password.*input\|password.*None\|password.*""\|\.get\("password'; then
            echo "::error::Found hardcoded password!"
            FOUND=1
          fi

          # Private keys
          if grep -rn 'PRIVATE KEY' . --include='*.py' --include='*.js' --include='*.yaml' --include='*.yml' --include='*.json' --include='*.pem' --include='*.key' \
            --exclude-dir=.git; then
            echo "::error::Found private key!"
            FOUND=1
          fi

          # IP addresses with credentials (user:pass@host)
          if grep -rn --include='*.py' --include='*.js' --include='*.yaml' --include='*.yml' --include='*.json' --include='*.html' --include='*.sh' \
            -E '[a-zA-Z0-9_]+:[a-zA-Z0-9_]+@[0-9]{1,3}\.[0-9]{1,3}\.' . --exclude-dir=.git; then
            echo "::error::Found credentials in URL!"
            FOUND=1
          fi

          # AWS keys
          if grep -rn -E '(AKIA|ASIA)[A-Z0-9]{16}' . --exclude-dir=.git; then
            echo "::error::Found AWS access key!"
            FOUND=1
          fi

          # Generic API keys/secrets (long hex or base64 strings assigned to variables with key/secret/token in name)
          if grep -rn --include='*.py' --include='*.js' --include='*.yaml' --include='*.yml' --include='*.sh' \
            -iE '(api_key|api_secret|secret_key|access_token)\s*[=:]\s*["\x27][A-Za-z0-9+/=_-]{20,}' . --exclude-dir=.git \
            | grep -v 'environ\|os\.get\|input\|None\|""'; then
            echo "::error::Found hardcoded API key/secret!"
            FOUND=1
          fi

          if [ "$FOUND" -eq 0 ]; then
            echo "No secrets found."
          else
            echo ""
            echo "::error::Secrets detected! Remove them before merging."
            exit 1
          fi
